name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  XCODE_VERSION: 'latest-stable'
  SCHEME: Whisky
  APP_NAME: Whisky

jobs:
  build:
    name: Build & Upload Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
            .build
            WhiskyKit/.build
          key: ${{ runner.os }}-spm-release-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-release-
            ${{ runner.os }}-spm-

      - name: Extract Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            # Manual trigger: read version from Xcode project
            VERSION=$(grep -m1 'MARKETING_VERSION' Whisky.xcodeproj/project.pbxproj | tr -d ' ;' | cut -d= -f2)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build Release Archive
        run: |
          xcodebuild -project Whisky.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath "${{ runner.temp }}/${{ env.APP_NAME }}.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}"

      - name: Export App from Archive
        run: |
          # The .app bundle lives inside the xcarchive
          APP_PATH="${{ runner.temp }}/${{ env.APP_NAME }}.xcarchive/Products/Applications/${{ env.APP_NAME }}.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Error: $APP_PATH not found"
            echo "Archive contents:"
            find "${{ runner.temp }}/${{ env.APP_NAME }}.xcarchive" -maxdepth 4 -type d
            exit 1
          fi

          echo "App bundle found at: $APP_PATH"
          echo "App bundle size: $(du -sh "$APP_PATH" | cut -f1)"

      - name: Create Zip Archive
        run: |
          APP_PATH="${{ runner.temp }}/${{ env.APP_NAME }}.xcarchive/Products/Applications/${{ env.APP_NAME }}.app"
          ZIP_PATH="${{ runner.temp }}/${{ env.APP_NAME }}.zip"

          # Create a zip from the .app bundle using ditto (preserves macOS metadata)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "Zip archive created: $(du -sh "$ZIP_PATH" | cut -f1)"

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}.zip
          path: ${{ env.zip_path }}

      - name: Upload Release Asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ env.zip_path }}#${{ env.APP_NAME }}.zip" \
            --clobber
